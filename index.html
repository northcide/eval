<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Scout Pro" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Scout Pro — Baseball Evaluation System</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚾</text></svg>" />
  <link rel="stylesheet" href="css/app.css?v=26" />
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#4a5568;">
      <div style="text-align:center">
        <div style="font-size:48px;margin-bottom:16px">⚾</div>
        <div class="spinner"></div>
      </div>
    </div>
  </div>
  <script src="js/app.js?v=26"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/eval/sw.js')
          .then(r => console.log('SW registered:', r.scope))
          .catch(e => console.warn('SW failed:', e));
      });
    }
  </script>
</body>
</html>
